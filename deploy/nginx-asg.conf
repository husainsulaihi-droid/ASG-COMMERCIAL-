# /etc/nginx/sites-available/asg
#
# Replaces the simpler config we set up in Phase 0.
# Now also reverse-proxies /api/* to the backend on localhost:3000
# and serves uploaded files from /var/asg/uploads/

server {
    listen 80;
    server_name crm.asgproperties.ae 129.121.88.215;
    root /var/www/asg;
    index index.html;

    # ─── Backend API ──────────────────────────────────
    # Proxies /api/* to the Node backend running on 127.0.0.1:3000.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Allow file uploads up to 30 MB
        client_max_body_size 30M;
    }

    # ─── Real-time SSE stream ─────────────────────────
    # /api/events is a long-lived text/event-stream connection. Disable
    # buffering, give it a long read timeout, and keep the connection
    # alive. Heartbeats from the backend run every 25s; we set a 5-minute
    # read timeout as a safety net.
    location /api/events {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
    }

    # ─── Uploaded files (photos, brochures, docs) ────
    # Served directly by nginx for speed.
    location /uploads/ {
        alias /var/asg/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ─── Static frontend ─────────────────────────────
    # HTML/CSS/JS: never cache (so deploys appear immediately on hard-refresh).
    # Without this, iOS Safari aggressively caches CSS for hours and users
    # see the old layout long after a deploy.
    location ~* \.(html|css|js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
        expires off;
    }

    # Everything else (images, fonts): default caching
    location / {
        try_files $uri $uri/ =404;
    }
}

# Note: HTTPS is added by certbot (`sudo certbot --nginx -d crm.asgproperties.ae`).
# After certbot runs, this file gets a second `server` block on :443 plus the
# :80 block redirects to :443. No manual edits needed.
